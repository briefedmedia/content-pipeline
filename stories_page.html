<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Story Approval — Briefed</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #000000;
  --bg1: #0a0a0a;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --bg4: #222222;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.12);
  --text: #ffffff;
  --text2: rgba(255,255,255,0.6);
  --text3: rgba(255,255,255,0.35);
  --blue: #0A84FF;
  --green: #30D158;
  --green-glow: rgba(48,209,88,0.15);
  --yellow: #FFD60A;
  --yellow-glow: rgba(255,214,10,0.15);
  --red: #FF453A;
  --red-dim: rgba(255,69,58,0.12);
  --orange: #FF9F0A;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 20px;
}

html { background: var(--bg); }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-back {
  font-size: 20px;
  cursor: pointer;
  color: var(--blue);
  padding: 4px 8px;
  border-radius: 8px;
  background: none;
  border: none;
  line-height: 1;
  flex-shrink: 0;
}
.header-back:active { opacity: 0.6; }
.header-title {
  font-size: 17px;
  font-weight: 600;
  flex: 1;
  text-align: center;
}
.header-timer {
  font-size: 13px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  padding: 4px 10px;
  border-radius: 20px;
  flex-shrink: 0;
  min-width: 64px;
  text-align: center;
}
.timer-active { background: rgba(255,214,10,0.15); color: var(--yellow); }
.timer-manual { background: rgba(48,209,88,0.15); color: var(--green); }

/* ── Subheader ── */
.subheader {
  padding: 10px 16px;
  font-size: 13px;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 12px;
  align-items: center;
}

/* ── Auto-select control area ── */
.cancel-pill-wrap { padding: 14px 16px 0; }

/* STATE 1 — window open, auto active: yellow cancel button */
.cancel-pill {
  width: 100%;
  background: rgba(255,214,10,0.1);
  border: 1px solid rgba(255,214,10,0.3);
  color: var(--yellow);
  border-radius: 14px;
  padding: 13px 18px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.cancel-pill:active { opacity: 0.7; }

/* STATE 2 — window open, auto cancelled: muted re-enable button */
.reenable-pill {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.45);
  border-radius: 14px;
  padding: 11px 18px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.reenable-pill:active { opacity: 0.7; }
.auto-note {
  font-size: 12px;
  color: var(--text3);
  padding: 6px 4px 0;
}

/* STATE 3 — expired, auto ran: green read-only pill */
.auto-done-pill {
  width: 100%;
  background: rgba(48,209,88,0.08);
  border: 1px solid rgba(48,209,88,0.2);
  color: var(--green);
  border-radius: 14px;
  padding: 11px 18px;
  font-size: 14px;
  font-weight: 500;
}

/* STATE 4 — expired, was cancelled: muted note */
.auto-closed-note {
  font-size: 13px;
  color: var(--text3);
  padding: 4px 2px;
}

/* ── Section headers ── */
.section-label {
  padding: 20px 16px 8px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
}

/* ── Story cards ── */
.cards-wrap { padding: 0 16px 40px; }
.story-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  margin-bottom: 12px;
  overflow: hidden;
  animation: fadeUp 0.3s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.story-card.approved { border-color: rgba(48,209,88,0.35); }
.story-card.declined { opacity: 0.45; border-color: rgba(255,255,255,0.05); }

.card-top {
  padding: 14px 16px 10px;
}
.card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.rank-num {
  font-size: 13px;
  font-weight: 700;
  color: var(--text3);
  min-width: 20px;
}
.score-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
}
.score-9 { background: rgba(48,209,88,0.18); color: var(--green); }
.score-8 { background: rgba(10,132,255,0.18); color: var(--blue); }
.score-7 { background: rgba(255,214,10,0.18); color: var(--yellow); }
.score-low { background: rgba(255,255,255,0.06); color: var(--text3); }
.status-badge {
  margin-left: auto;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
}
.status-approved { background: rgba(48,209,88,0.15); color: var(--green); }
.status-declined { background: rgba(255,255,255,0.06); color: var(--text3); }

.card-title {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 2px;
}

/* ── Expandable sections ── */
.card-body { padding: 0 16px; }
.card-section {
  border-top: 1px solid var(--border);
  padding: 10px 0;
}
.card-section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 5px;
}
.card-section-text {
  font-size: 14px;
  line-height: 1.5;
  color: var(--text2);
}
.card-section-text.hook-text { font-style: italic; }

.sources-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 4px;
}
.source-pill {
  font-size: 11px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 9px;
  color: var(--text3);
}
.cost-text {
  font-size: 13px;
  color: var(--text3);
}

/* ── Action buttons ── */
.card-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 12px 16px 14px;
  border-top: 1px solid var(--border);
}
.btn-approve {
  width: 100%;
  background: var(--green);
  color: #000;
  border: none;
  border-radius: var(--r-md);
  padding: 13px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-approve:active { opacity: 0.8; }
.btn-approve:disabled {
  background: rgba(48,209,88,0.15);
  color: var(--green);
  cursor: default;
}
.btn-decline {
  width: 100%;
  background: none;
  border: 1px solid rgba(255,69,58,0.25);
  color: rgba(255,69,58,0.7);
  border-radius: var(--r-md);
  padding: 10px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}
.btn-decline:active { background: var(--red-dim); }
.btn-decline:disabled {
  border-color: var(--border);
  color: var(--text3);
  cursor: default;
}

/* ── Empty state ── */
.empty-state {
  text-align: center;
  color: var(--text3);
  padding: 60px 20px;
  font-size: 15px;
  line-height: 1.5;
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: calc(20px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(30,30,30,0.95);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 10px 18px;
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: all 0.25s ease;
  z-index: 999;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Breaking news section ── */
.breaking-section {
  display: none;
  padding: 0 16px;
}

.breaking-section.visible { display: block; }

.breaking-label {
  padding: 14px 0 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.breaking-badge {
  background: var(--red);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 5px;
  letter-spacing: 0.8px;
  animation: breakingPulse 2s ease-in-out infinite;
}

@keyframes breakingPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.breaking-label-text {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--red);
}

.breaking-card {
  background: linear-gradient(135deg, rgba(255,69,58,0.08), rgba(255,159,10,0.04));
  border: 1px solid rgba(255,69,58,0.3);
  border-radius: var(--r-lg, 20px);
  margin-bottom: 12px;
  overflow: hidden;
  animation: breakingSlide 0.4s ease both;
}

@keyframes breakingSlide {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.breaking-card-top {
  padding: 14px 16px 10px;
}

.breaking-card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.urgency-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  background: rgba(255,69,58,0.18);
  color: var(--red);
}

.breaking-source {
  font-size: 11px;
  color: var(--text3);
}

.breaking-timer {
  margin-left: auto;
  font-size: 11px;
  font-weight: 600;
  color: var(--yellow);
  font-variant-numeric: tabular-nums;
}

.breaking-card-title {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 6px;
  color: var(--text);
}

.breaking-card-preview {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
  padding: 0 16px 12px;
  border-top: 1px solid rgba(255,69,58,0.1);
  padding-top: 10px;
}

.breaking-visuals-status {
  font-size: 11px;
  color: var(--text3);
  padding: 0 16px 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.breaking-visuals-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--blue);
  animation: pulse-dot 1.5s infinite;
}

.breaking-visuals-dot.done {
  background: var(--green);
  animation: none;
}

.breaking-actions {
  display: flex;
  gap: 0;
  border-top: 1px solid rgba(255,69,58,0.15);
}

.breaking-action-btn {
  flex: 1;
  padding: 14px 8px;
  background: transparent;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.breaking-action-btn:first-child {
  border-right: 1px solid rgba(255,69,58,0.15);
}

.breaking-action-btn.tts-btn {
  color: var(--red);
}

.breaking-action-btn.tts-btn:active {
  background: rgba(255,69,58,0.08);
}

.breaking-action-btn.hold-btn {
  color: var(--text3);
}

.breaking-action-btn.hold-btn:active {
  background: rgba(255,255,255,0.04);
}

.breaking-decided {
  padding: 12px 16px;
  border-top: 1px solid rgba(255,69,58,0.15);
  font-size: 13px;
  font-weight: 500;
}

.breaking-decided.tts {
  color: var(--red);
  background: rgba(255,69,58,0.04);
}

.breaking-decided.hold {
  color: var(--text3);
}
</style>
</head>
<body>

<div class="header">
  <button class="header-back" onclick="window.location.href='/'">←</button>
  <div class="header-title">Story Approval</div>
  <div class="header-timer timer-active" id="timerBadge">--:--</div>
</div>

<div class="subheader">
  <span id="dateLabel">Today</span>
  <span id="countLabel">— candidates</span>
  <span id="autoLabel"></span>
</div>

<div class="breaking-section" id="breakingSection">
  <div class="breaking-label">
    <span class="breaking-badge">BREAKING</span>
    <span class="breaking-label-text">Urgent Stories</span>
  </div>
  <div id="breakingCards"></div>
</div>

<div id="autoControlArea"></div>

<div id="activeSection">
  <div class="section-label" id="activeLabel">Today's Stories</div>
  <div class="cards-wrap" id="activeCards">
    <div class="empty-state">Loading stories…</div>
  </div>
</div>

<div id="declinedSection" style="display:none">
  <div class="section-label">Declined Today</div>
  <div class="cards-wrap" id="declinedCards"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API   = '';
const TODAY = new Date().toISOString().slice(0, 10);

let state = {
  candidates:    [],
  approved:      new Set(),
  declined:      new Set(),
  autoCancelled: false,
  phase1Timestamp: null,
  breakingJobs:  [],
};

// ── Window expiry helper ───────────────────────────────────────────────────────

function isWindowExpired(phase1Timestamp) {
  if (!phase1Timestamp) return false;
  const end = new Date(phase1Timestamp).getTime() + 2 * 60 * 60 * 1000;
  if (isNaN(end)) return false;
  return Date.now() > end;
}

function getWindowEnd(phase1Timestamp) {
  if (!phase1Timestamp) return null;
  const end = new Date(phase1Timestamp).getTime() + 2 * 60 * 60 * 1000;
  if (isNaN(end)) return null;
  return end;
}

// Returns 1–5 per the state machine spec
function getAutoState() {
  const approved  = (state.approved?.size || 0) > 0;
  const expired   = isWindowExpired(state.phase1Timestamp);
  const cancelled = state.autoCancelled;
  if (approved)                  return 5; // manually approved, auto irrelevant
  if ( expired && !cancelled)    return 3; // expired, auto ran
  if ( expired &&  cancelled)    return 4; // expired, was blocked
  if (!expired && !cancelled)    return 1; // window open, auto active
  return 2;                                // window open, cancelled
}

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  document.getElementById('dateLabel').textContent = TODAY;
  await Promise.all([loadCandidates(), loadApprovalStatus(), loadBreaking()]);
  render();
  setInterval(pollStatus, 30000);
}

async function loadCandidates() {
  try {
    const r = await fetch(`${API}/candidates/today`);
    if (r.ok) state.candidates = await r.json();
  } catch(e) { console.error('Failed to load candidates', e); }
}

async function loadApprovalStatus() {
  try {
    const r = await fetch(`${API}/approve/${TODAY}/status`);
    if (r.ok) {
      const d = await r.json();
      state.approved      = new Set(d.approved || []);
      state.declined      = new Set(d.declined || []);
      state.autoCancelled = d.auto_cancelled || false;
      state.phase1Timestamp = d.timestamp || null;
    }
  } catch(e) { console.error('Failed to load approval status', e); }
}

async function pollStatus() {
  await Promise.all([loadApprovalStatus(), loadBreaking()]);
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  const n = state.candidates.length;
  document.getElementById('countLabel').textContent = `${n} candidate${n !== 1 ? 's' : ''}`;

  const autoState = getAutoState();
  document.getElementById('autoLabel').textContent =
    autoState === 5 ? '• Approved'             :
    autoState === 1 ? '• Auto-select active'   :
    autoState === 2 ? '• Manual mode'           :
    autoState === 3 ? '• Auto-approved'         : '• Window closed';

  renderAutoControl(autoState);

  // Split cards
  const active   = [];
  const declined = [];
  state.candidates.forEach((s, i) => {
    if (state.declined.has(i)) declined.push({s, i});
    else active.push({s, i});
  });

  renderCardList(document.getElementById('activeCards'), active, false);

  if (declined.length) {
    document.getElementById('declinedSection').style.display = '';
    renderCardList(document.getElementById('declinedCards'), declined, true);
  } else {
    document.getElementById('declinedSection').style.display = 'none';
  }
}

function renderAutoControl(autoState) {
  const area = document.getElementById('autoControlArea');

  if (autoState === 5) {
    // STATE 5: manually approved — hide toggle, show green pill
    stopCountdown();
    updateTimerBadge(null);
    const approvedIdx = [...state.approved][0];
    const storyNum = approvedIdx + 1;
    area.innerHTML = `
      <div class="cancel-pill-wrap">
        <div class="auto-done-pill">✓ Story ${storyNum} approved — auto-select inactive</div>
      </div>`;

  } else if (autoState === 1) {
    // Window open, auto active — yellow cancel button + ticking countdown
    area.innerHTML = `
      <div class="cancel-pill-wrap">
        <button class="cancel-pill" id="cancelPill" onclick="toggleAutoSelect()">
          <span>⏱ Cancel Auto-Select</span>
          <span>✕</span>
        </button>
      </div>`;
    startCountdown();

  } else if (autoState === 2) {
    // Window open, cancelled — muted re-enable button, no countdown
    stopCountdown();
    updateTimerBadge(null);
    area.innerHTML = `
      <div class="cancel-pill-wrap">
        <button class="reenable-pill" onclick="toggleAutoSelect()">
          <span>↩ Re-enable Auto-Select</span>
          <span></span>
        </button>
        <p class="auto-note">Auto-select is off — approve manually above</p>
      </div>`;

  } else if (autoState === 3) {
    // Expired, auto ran — green read-only pill
    stopCountdown();
    updateTimerBadge(null);
    const expiredAt = getWindowEnd(state.phase1Timestamp);
    const timeStr = expiredAt ? new Date(expiredAt).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) : '';
    area.innerHTML = `
      <div class="cancel-pill-wrap">
        <div class="auto-done-pill">✓ Auto-approved at ${timeStr}</div>
      </div>`;

  } else {
    // STATE 4: expired, was cancelled — muted read-only note
    stopCountdown();
    updateTimerBadge(null);
    area.innerHTML = `
      <div class="cancel-pill-wrap">
        <div class="auto-closed-note">Auto-select window closed — approve a story manually above</div>
      </div>`;
  }
}

function renderCardList(container, items, isDeclined) {
  if (!items.length) {
    container.innerHTML = '<div class="empty-state">No stories here yet.<br>Phase 1 runs at 17:00 UTC.</div>';
    return;
  }
  container.innerHTML = items.map(({s, i}) => cardHTML(s, i, isDeclined)).join('');
}

function cardHTML(s, i, forceDeclined) {
  const isApproved = state.approved.has(i);
  const isDeclined = forceDeclined || state.declined.has(i);
  const score      = s.score || 0;
  const scoreClass = score >= 9 ? 'score-9' : score >= 8 ? 'score-8' : score >= 7 ? 'score-7' : 'score-low';

  const statusBadge = isApproved
    ? '<span class="status-badge status-approved">✓ Approved</span>'
    : isDeclined
    ? '<span class="status-badge status-declined">Declined</span>'
    : '';

  const sources = (s.wikipedia_sources || []).map(src =>
    `<span class="source-pill">${escHtml(src)}</span>`
  ).join('');

  const approveBtn = isApproved
    ? `<button class="btn-approve" disabled>✓ Approved — Phase 2 Running</button>`
    : isDeclined
    ? `<button class="btn-approve" disabled>Declined</button>`
    : `<button class="btn-approve" onclick="approveStory(${i})">▶ Approve This Story</button>`;

  const declineBtn = isDeclined
    ? `<button class="btn-decline" disabled>Declined</button>`
    : isApproved
    ? ''
    : `<button class="btn-decline" onclick="declineStory(${i})">Decline</button>`;

  return `
  <div class="story-card ${isApproved ? 'approved' : ''} ${isDeclined ? 'declined' : ''}" id="card-${i}">
    <div class="card-top">
      <div class="card-meta">
        <span class="rank-num">${i + 1}</span>
        <span class="score-badge ${scoreClass}">${score}/10</span>
        ${statusBadge}
      </div>
      <div class="card-title">${escHtml(s.title || 'Untitled')}</div>
    </div>
    <div class="card-body">
      ${s.significance ? `
      <div class="card-section">
        <div class="card-section-label">Why This Matters</div>
        <div class="card-section-text">${escHtml(s.significance)}</div>
      </div>` : ''}
      ${s.hook ? `
      <div class="card-section">
        <div class="card-section-label">Hook</div>
        <div class="card-section-text hook-text">${escHtml(s.hook)}</div>
      </div>` : ''}
      ${sources ? `
      <div class="card-section">
        <div class="card-section-label">Sources</div>
        <div class="sources-row">${sources}</div>
      </div>` : ''}
      <div class="card-section">
        <div class="cost-text">~$${s.estimated_cost_low || '0.45'}–$${s.estimated_cost_high || '0.65'} to produce</div>
      </div>
    </div>
    ${!isDeclined ? `
    <div class="card-actions">
      ${approveBtn}
      ${declineBtn}
    </div>` : ''}
  </div>`;
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Actions ───────────────────────────────────────────────────────────────────

async function approveStory(index) {
  const btn = document.querySelector(`#card-${index} .btn-approve`);
  if (btn) { btn.textContent = '…'; btn.disabled = true; }

  try {
    const r = await fetch(`${API}/approve/${TODAY}/${index}`);
    if (r.ok || r.status === 202) {
      state.approved.add(index);
      render();
      toast(`Story ${index + 1} approved — Phase 2 starting`, '✓');
    } else {
      throw new Error(`HTTP ${r.status}`);
    }
  } catch(e) {
    toast(`Approval failed: ${e.message}`, '⚠');
    if (btn) { btn.textContent = '▶ Approve This Story'; btn.disabled = false; }
  }
}

async function declineStory(index) {
  const btn = document.querySelector(`#card-${index} .btn-decline`);
  if (btn) { btn.textContent = '…'; btn.disabled = true; }

  try {
    const r = await fetch(`${API}/approve/${TODAY}/decline/${index}`, { method: 'POST' });
    if (r.ok) {
      state.declined.add(index);
      render();
      toast(`Story ${index + 1} declined`, '✕');
    } else {
      throw new Error(`HTTP ${r.status}`);
    }
  } catch(e) {
    toast(`Decline failed: ${e.message}`, '⚠');
    if (btn) { btn.textContent = 'Decline'; btn.disabled = false; }
  }
}

async function toggleAutoSelect() {
  try {
    const r = await fetch(`${API}/approve/${TODAY}/cancel-auto`, { method: 'POST' });
    const d = await r.json().catch(() => ({}));

    if (r.status === 400 && d.error === 'window_expired') {
      // Window already closed — transition to STATE 4
      state.autoCancelled = true; // treat as cancelled so STATE 4 renders
      render();
      toast('Auto-select window already closed — approve manually', '⚠');
      return;
    }

    if (r.ok) {
      state.autoCancelled = d.auto_cancelled;
      render();
      if (d.auto_cancelled) {
        toast("Auto-select cancelled — story #1 won't auto-approve", '🚫');
      } else {
        toast('Auto-select re-enabled — story #1 will auto-approve if no response', '⏱');
      }
    } else {
      toast('Failed — try again', '⚠');
    }
  } catch(e) {
    toast('Network error — try again', '⚠');
  }
}

// ── Countdown ─────────────────────────────────────────────────────────────────

let countdownInterval = null;

function startCountdown() {
  stopCountdown();
  const end = getWindowEnd(state.phase1Timestamp);
  if (!end) { updateTimerBadge(null); return; }
  countdownInterval = setInterval(() => tickCountdown(end), 1000);
  tickCountdown(end);
}

function stopCountdown() {
  if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
}

function tickCountdown(end) {
  const remain = Math.max(0, end - Date.now());
  if (remain <= 0) { stopCountdown(); render(); return; }
  const mins = Math.floor(remain / 60000);
  const secs = Math.floor((remain % 60000) / 1000);
  updateTimerBadge(`${mins}:${String(secs).padStart(2,'0')}`);
}

function updateTimerBadge(text) {
  const badge = document.getElementById('timerBadge');
  if (!text) {
    badge.textContent = 'Manual';
    badge.className   = 'header-timer timer-manual';
  } else {
    badge.textContent = text;
    badge.className   = 'header-timer timer-active';
  }
}

// ── Toast ─────────────────────────────────────────────────────────────────────

let toastTimer = null;
function toast(msg, icon) {
  const el = document.getElementById('toast');
  el.textContent = icon ? `${icon}  ${msg}` : msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ── Breaking news ─────────────────────────────────────────────────────────────

async function loadBreaking() {
  try {
    const r = await fetch(`${API}/breaking/active`);
    if (r.ok) state.breakingJobs = await r.json();
    else state.breakingJobs = [];
  } catch(e) { state.breakingJobs = []; }
  renderBreaking();
}

function renderBreaking() {
  const section = document.getElementById('breakingSection');
  const container = document.getElementById('breakingCards');
  const jobs = state.breakingJobs || [];

  if (!jobs.length) {
    section.classList.remove('visible');
    return;
  }

  section.classList.add('visible');
  container.innerHTML = jobs.map(j => {
    const created = new Date(j.created_at).getTime();
    const deadline = created + 2 * 60 * 60 * 1000;
    const remaining = Math.max(0, deadline - Date.now());
    const mins = Math.floor(remaining / 60000);
    const secs = Math.floor((remaining % 60000) / 1000);
    const timerStr = remaining > 0 ? `${mins}:${String(secs).padStart(2,'0')} left` : 'Expiring…';

    const visualsDone = j.visuals_status === 'done';
    const visualsLabel = visualsDone ? 'Visuals ready' : 'Visuals generating…';
    const visualsDotClass = visualsDone ? 'breaking-visuals-dot done' : 'breaking-visuals-dot';

    const decided = j.decision;

    const actionsHTML = decided
      ? `<div class="breaking-decided ${decided}">
           ${decided === 'tts' ? '⚡ AI voice selected — assembling now' : '🎙 Holding for your VO'}
         </div>`
      : `<div class="breaking-actions">
           <button class="breaking-action-btn tts-btn" onclick="breakingDecide('${escHtml(j.job_id)}', 'tts')">
             ⚡ Use AI Voice
           </button>
           <button class="breaking-action-btn hold-btn" onclick="breakingDecide('${escHtml(j.job_id)}', 'hold')">
             🎙 Hold for My VO
           </button>
         </div>`;

    return `
    <div class="breaking-card" id="brk-${escHtml(j.job_id)}">
      <div class="breaking-card-top">
        <div class="breaking-card-meta">
          <span class="urgency-badge">${j.urgency}/10 Urgency</span>
          <span class="breaking-source">${escHtml(j.account_type || 'news')}</span>
          <span class="breaking-timer">${timerStr}</span>
        </div>
        <div class="breaking-card-title">${escHtml(j.title)}</div>
      </div>
      ${j.script_preview ? `
      <div class="breaking-card-preview">${escHtml(j.script_preview)}…</div>` : ''}
      <div class="breaking-visuals-status">
        <div class="${visualsDotClass}"></div>
        <span>${visualsLabel}</span>
      </div>
      ${actionsHTML}
    </div>`;
  }).join('');
}

async function breakingDecide(jobId, decision) {
  const card = document.getElementById(`brk-${jobId}`);
  const btns = card?.querySelectorAll('.breaking-action-btn');
  if (btns) btns.forEach(b => { b.disabled = true; b.textContent = '…'; });

  try {
    const r = await fetch(`${API}/breaking/${jobId}/decide?decision=${decision}`, { method: 'POST' });
    if (r.ok) {
      const d = await r.json();
      toast(d.message || 'Decision recorded', decision === 'tts' ? '⚡' : '🎙');
      // Update local state and re-render
      for (const j of state.breakingJobs) {
        if (j.job_id === jobId) {
          j.decision = decision;
          break;
        }
      }
      renderBreaking();
    } else {
      toast('Failed — try again', '⚠');
      if (btns) btns.forEach(b => b.disabled = false);
    }
  } catch(e) {
    toast('Network error — try again', '⚠');
    if (btns) btns.forEach(b => b.disabled = false);
  }
}

// Keep breaking timers ticking
setInterval(() => {
  if (state.breakingJobs?.length > 0) renderBreaking();
}, 1000);

// ── Boot ──────────────────────────────────────────────────────────────────────
init();
</script>
