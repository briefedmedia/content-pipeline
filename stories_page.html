<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Story Approval — Briefed</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #000000;
  --bg1: #0a0a0a;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --bg4: #222222;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.12);
  --text: #ffffff;
  --text2: rgba(255,255,255,0.6);
  --text3: rgba(255,255,255,0.35);
  --blue: #0A84FF;
  --green: #30D158;
  --green-glow: rgba(48,209,88,0.15);
  --yellow: #FFD60A;
  --yellow-glow: rgba(255,214,10,0.15);
  --red: #FF453A;
  --red-dim: rgba(255,69,58,0.12);
  --orange: #FF9F0A;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 20px;
}

html { background: var(--bg); }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-back {
  font-size: 20px;
  cursor: pointer;
  color: var(--blue);
  padding: 4px 8px;
  border-radius: 8px;
  background: none;
  border: none;
  line-height: 1;
  flex-shrink: 0;
}
.header-back:active { opacity: 0.6; }
.header-title {
  font-size: 17px;
  font-weight: 600;
  flex: 1;
  text-align: center;
}
.header-timer {
  font-size: 13px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  padding: 4px 10px;
  border-radius: 20px;
  flex-shrink: 0;
  min-width: 64px;
  text-align: center;
}
.timer-active { background: rgba(255,214,10,0.15); color: var(--yellow); }
.timer-manual { background: rgba(48,209,88,0.15); color: var(--green); }

/* ── Subheader ── */
.subheader {
  padding: 10px 16px;
  font-size: 13px;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 12px;
  align-items: center;
}

/* ── Cancel auto pill ── */
.cancel-pill-wrap { padding: 14px 16px 0; }
.cancel-pill {
  width: 100%;
  background: rgba(255,214,10,0.1);
  border: 1px solid rgba(255,214,10,0.3);
  color: var(--yellow);
  border-radius: 14px;
  padding: 13px 18px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.cancel-pill:active { opacity: 0.7; }
.cancel-pill.off {
  background: rgba(48,209,88,0.08);
  border-color: rgba(48,209,88,0.25);
  color: var(--green);
}

/* ── Section headers ── */
.section-label {
  padding: 20px 16px 8px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
}

/* ── Story cards ── */
.cards-wrap { padding: 0 16px 40px; }
.story-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  margin-bottom: 12px;
  overflow: hidden;
  animation: fadeUp 0.3s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.story-card.approved { border-color: rgba(48,209,88,0.35); }
.story-card.declined { opacity: 0.45; border-color: rgba(255,255,255,0.05); }

.card-top {
  padding: 14px 16px 10px;
}
.card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.rank-num {
  font-size: 13px;
  font-weight: 700;
  color: var(--text3);
  min-width: 20px;
}
.score-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
}
.score-9 { background: rgba(48,209,88,0.18); color: var(--green); }
.score-8 { background: rgba(10,132,255,0.18); color: var(--blue); }
.score-7 { background: rgba(255,214,10,0.18); color: var(--yellow); }
.score-low { background: rgba(255,255,255,0.06); color: var(--text3); }
.status-badge {
  margin-left: auto;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
}
.status-approved { background: rgba(48,209,88,0.15); color: var(--green); }
.status-declined { background: rgba(255,255,255,0.06); color: var(--text3); }

.card-title {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 2px;
}

/* ── Expandable sections ── */
.card-body { padding: 0 16px; }
.card-section {
  border-top: 1px solid var(--border);
  padding: 10px 0;
}
.card-section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 5px;
}
.card-section-text {
  font-size: 14px;
  line-height: 1.5;
  color: var(--text2);
}
.card-section-text.hook-text { font-style: italic; }

.sources-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 4px;
}
.source-pill {
  font-size: 11px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 9px;
  color: var(--text3);
}
.cost-text {
  font-size: 13px;
  color: var(--text3);
}

/* ── Action buttons ── */
.card-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 12px 16px 14px;
  border-top: 1px solid var(--border);
}
.btn-approve {
  width: 100%;
  background: var(--green);
  color: #000;
  border: none;
  border-radius: var(--r-md);
  padding: 13px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-approve:active { opacity: 0.8; }
.btn-approve:disabled {
  background: rgba(48,209,88,0.15);
  color: var(--green);
  cursor: default;
}
.btn-decline {
  width: 100%;
  background: none;
  border: 1px solid rgba(255,69,58,0.25);
  color: rgba(255,69,58,0.7);
  border-radius: var(--r-md);
  padding: 10px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}
.btn-decline:active { background: var(--red-dim); }
.btn-decline:disabled {
  border-color: var(--border);
  color: var(--text3);
  cursor: default;
}

/* ── Empty state ── */
.empty-state {
  text-align: center;
  color: var(--text3);
  padding: 60px 20px;
  font-size: 15px;
  line-height: 1.5;
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: calc(20px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(30,30,30,0.95);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 10px 18px;
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: all 0.25s ease;
  z-index: 999;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<div class="header">
  <button class="header-back" onclick="window.location.href='/'">←</button>
  <div class="header-title">Story Approval</div>
  <div class="header-timer timer-active" id="timerBadge">--:--</div>
</div>

<div class="subheader">
  <span id="dateLabel">Today</span>
  <span id="countLabel">— candidates</span>
  <span id="autoLabel"></span>
</div>

<div class="cancel-pill-wrap" id="cancelPillWrap">
  <button class="cancel-pill" id="cancelPill" onclick="cancelAutoSelect()">
    <span>⏱ Cancel Auto-Select</span>
    <span>✕</span>
  </button>
</div>

<div id="activeSection">
  <div class="section-label" id="activeLabel">Today's Stories</div>
  <div class="cards-wrap" id="activeCards">
    <div class="empty-state">Loading stories…</div>
  </div>
</div>

<div id="declinedSection" style="display:none">
  <div class="section-label">Declined Today</div>
  <div class="cards-wrap" id="declinedCards"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API   = '';
const TODAY = new Date().toISOString().slice(0, 10);

let state = {
  candidates:    [],
  approved:      new Set(),
  declined:      new Set(),
  autoCancelled: false,
  autoTimestamp: null,
};

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  document.getElementById('dateLabel').textContent = TODAY;
  await Promise.all([loadCandidates(), loadApprovalStatus()]);
  render();
  startCountdown();
  setInterval(pollStatus, 30000);
}

async function loadCandidates() {
  try {
    const r = await fetch(`${API}/candidates/today`);
    if (r.ok) state.candidates = await r.json();
  } catch(e) { console.error('Failed to load candidates', e); }
}

async function loadApprovalStatus() {
  try {
    const r = await fetch(`${API}/approve/${TODAY}/status`);
    if (r.ok) {
      const d = await r.json();
      state.approved      = new Set(d.approved || []);
      state.declined      = new Set(d.declined || []);
      state.autoCancelled = d.auto_cancelled || false;
      state.autoTimestamp = d.timestamp || null;
    }
  } catch(e) { console.error('Failed to load approval status', e); }
}

async function pollStatus() {
  await loadApprovalStatus();
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  const n = state.candidates.length;
  document.getElementById('countLabel').textContent = `${n} candidate${n !== 1 ? 's' : ''}`;
  document.getElementById('autoLabel').textContent =
    state.autoCancelled ? '• Manual mode' : '• Auto-select active';

  // Cancel pill
  const pillWrap = document.getElementById('cancelPillWrap');
  const pill     = document.getElementById('cancelPill');
  if (state.autoCancelled) {
    pill.className = 'cancel-pill off';
    pill.innerHTML = '<span>✓ Auto-Select Off</span><span></span>';
    pill.onclick   = null;
  } else if (state.approved.size > 0) {
    pillWrap.style.display = 'none';
  } else {
    pill.className = 'cancel-pill';
    pill.innerHTML = '<span>⏱ Cancel Auto-Select</span><span>✕</span>';
    pill.onclick   = cancelAutoSelect;
    pillWrap.style.display = '';
  }

  // Split cards
  const active   = [];
  const declined = [];
  state.candidates.forEach((s, i) => {
    if (state.declined.has(i)) declined.push({s, i});
    else active.push({s, i});
  });

  renderCardList(document.getElementById('activeCards'), active, false);

  if (declined.length) {
    document.getElementById('declinedSection').style.display = '';
    renderCardList(document.getElementById('declinedCards'), declined, true);
  } else {
    document.getElementById('declinedSection').style.display = 'none';
  }
}

function renderCardList(container, items, isDeclined) {
  if (!items.length) {
    container.innerHTML = '<div class="empty-state">No stories here yet.<br>Phase 1 runs at 17:00 UTC.</div>';
    return;
  }
  container.innerHTML = items.map(({s, i}) => cardHTML(s, i, isDeclined)).join('');
}

function cardHTML(s, i, forceDeclined) {
  const isApproved = state.approved.has(i);
  const isDeclined = forceDeclined || state.declined.has(i);
  const score      = s.score || 0;
  const scoreClass = score >= 9 ? 'score-9' : score >= 8 ? 'score-8' : score >= 7 ? 'score-7' : 'score-low';

  const statusBadge = isApproved
    ? '<span class="status-badge status-approved">✓ Approved</span>'
    : isDeclined
    ? '<span class="status-badge status-declined">Declined</span>'
    : '';

  const sources = (s.wikipedia_sources || []).map(src =>
    `<span class="source-pill">${escHtml(src)}</span>`
  ).join('');

  const approveBtn = isApproved
    ? `<button class="btn-approve" disabled>✓ Approved — Phase 2 Running</button>`
    : isDeclined
    ? `<button class="btn-approve" disabled>Declined</button>`
    : `<button class="btn-approve" onclick="approveStory(${i})">▶ Approve This Story</button>`;

  const declineBtn = isDeclined
    ? `<button class="btn-decline" disabled>Declined</button>`
    : isApproved
    ? ''
    : `<button class="btn-decline" onclick="declineStory(${i})">Decline</button>`;

  return `
  <div class="story-card ${isApproved ? 'approved' : ''} ${isDeclined ? 'declined' : ''}" id="card-${i}">
    <div class="card-top">
      <div class="card-meta">
        <span class="rank-num">${i + 1}</span>
        <span class="score-badge ${scoreClass}">${score}/10</span>
        ${statusBadge}
      </div>
      <div class="card-title">${escHtml(s.title || 'Untitled')}</div>
    </div>
    <div class="card-body">
      ${s.significance ? `
      <div class="card-section">
        <div class="card-section-label">Why This Matters</div>
        <div class="card-section-text">${escHtml(s.significance)}</div>
      </div>` : ''}
      ${s.hook ? `
      <div class="card-section">
        <div class="card-section-label">Hook</div>
        <div class="card-section-text hook-text">${escHtml(s.hook)}</div>
      </div>` : ''}
      ${sources ? `
      <div class="card-section">
        <div class="card-section-label">Sources</div>
        <div class="sources-row">${sources}</div>
      </div>` : ''}
      <div class="card-section">
        <div class="cost-text">~$${s.estimated_cost_low || '0.45'}–$${s.estimated_cost_high || '0.65'} to produce</div>
      </div>
    </div>
    ${!isDeclined ? `
    <div class="card-actions">
      ${approveBtn}
      ${declineBtn}
    </div>` : ''}
  </div>`;
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Actions ───────────────────────────────────────────────────────────────────

async function approveStory(index) {
  const btn = document.querySelector(`#card-${index} .btn-approve`);
  if (btn) { btn.textContent = '…'; btn.disabled = true; }

  try {
    const r = await fetch(`${API}/approve/${TODAY}/${index}`);
    if (r.ok || r.status === 202) {
      state.approved.add(index);
      render();
      toast(`Story ${index + 1} approved — Phase 2 starting`, '✓');
    } else {
      throw new Error(`HTTP ${r.status}`);
    }
  } catch(e) {
    toast(`Approval failed: ${e.message}`, '⚠');
    if (btn) { btn.textContent = '▶ Approve This Story'; btn.disabled = false; }
  }
}

async function declineStory(index) {
  const btn = document.querySelector(`#card-${index} .btn-decline`);
  if (btn) { btn.textContent = '…'; btn.disabled = true; }

  try {
    const r = await fetch(`${API}/approve/${TODAY}/decline/${index}`, { method: 'POST' });
    if (r.ok) {
      state.declined.add(index);
      render();
      toast(`Story ${index + 1} declined`, '✕');
    } else {
      throw new Error(`HTTP ${r.status}`);
    }
  } catch(e) {
    toast(`Decline failed: ${e.message}`, '⚠');
    if (btn) { btn.textContent = 'Decline'; btn.disabled = false; }
  }
}

async function cancelAutoSelect() {
  try {
    const r = await fetch(`${API}/approve/${TODAY}/cancel-auto`, { method: 'POST' });
    const d = await r.json().catch(() => ({}));
    if (r.ok) {
      state.autoCancelled = true;
      render();
      stopCountdown();
      toast('Auto-select cancelled — manual mode', '🚫');
    } else {
      toast('Failed to cancel auto-select — try again', '⚠');
    }
  } catch(e) {
    toast('Network error — try again', '⚠');
  }
}

// ── Countdown ─────────────────────────────────────────────────────────────────

let countdownInterval = null;

function startCountdown() {
  if (state.autoCancelled || state.approved.size > 0 || !state.autoTimestamp) {
    updateTimerBadge(null);
    return;
  }
  countdownInterval = setInterval(tickCountdown, 1000);
  tickCountdown();
}

function stopCountdown() {
  clearInterval(countdownInterval);
  updateTimerBadge(null);
}

function tickCountdown() {
  if (!state.autoTimestamp) { stopCountdown(); return; }
  const end     = new Date(state.autoTimestamp).getTime() + 2 * 60 * 60 * 1000;
  const remain  = Math.max(0, end - Date.now());
  const mins    = Math.floor(remain / 60000);
  const secs    = Math.floor((remain % 60000) / 1000);
  if (remain <= 0) { stopCountdown(); return; }
  updateTimerBadge(`${mins}:${String(secs).padStart(2,'0')}`);
}

function updateTimerBadge(text) {
  const badge = document.getElementById('timerBadge');
  if (!text) {
    badge.textContent = 'Manual';
    badge.className   = 'header-timer timer-manual';
  } else {
    badge.textContent = text;
    badge.className   = 'header-timer timer-active';
  }
}

// ── Toast ─────────────────────────────────────────────────────────────────────

let toastTimer = null;
function toast(msg, icon) {
  const el = document.getElementById('toast');
  el.textContent = icon ? `${icon}  ${msg}` : msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
